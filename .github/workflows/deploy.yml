name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy and set secrets
        run: |
          wrangler deploy
          echo "${{ secrets.ANTHROPIC_KEY }}" | wrangler secret put ANTHROPIC_KEY
          echo "${{ secrets.WHATSAPP_TOKEN }}" | wrangler secret put WHATSAPP_TOKEN
          echo "${{ secrets.PHONE_NUMBER_ID }}" | wrangler secret put PHONE_NUMBER_ID
          echo "${{ secrets.SUPABASE_URL }}" | wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_KEY }}" | wrangler secret put SUPABASE_KEY
          echo "${{ secrets.GOOGLE_PLACES_KEY }}" | wrangler secret put GOOGLE_PLACES_KEY
          echo "${{ secrets.VERIFY_TOKEN }}" | wrangler secret put VERIFY_TOKEN
          echo "${{ secrets.BRAVE_API_KEY }}" | wrangler secret put BRAVE_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
